global:
  namespace: host
  tag: v1.0.0
  githubRepo: MidasWR/ShareMTC

postgres:
  host: host-db
  port: "5432"
  database: host
  sslmode: require
  userSecretName: host.host-db.credentials.postgresql.acid.zalan.do
  usernameKey: username
  passwordKey: password

auth:
  dns: authservice
  image: midaswr/host-authservice
  port: 8081

admin:
  dns: adminservice
  image: midaswr/host-adminservice
  port: 8082
  enableSyntheticCatalogSeed: false
  agentInstaller:
    resourceApiURL: ""
    kafkaBrokers: ""
    publicHost: ""
    kafkaPort: 9092
    imageRepo: midaswr/host-hostagent

resource:
  dns: resourceservice
  image: midaswr/host-resourceservice
  port: 8083
  provisioningBaseURL: http://provisioningservice:8085
  createRateLimitRPM: 5
  vmTTLMinutes: 5

provisioning:
  dns: provisioningservice
  image: midaswr/host-provisioningservice
  port: 8085
  ttlWorkerIntervalSeconds: 15
  providerSecretName: host-provider-secrets
  digitalOceanTokenKey: DIGITALOCEAN_TOKEN
  runpodApiKeyKey: RUNPOD_API_KEY

security:
  serviceSecretName: host-service-secrets
  provisioningServiceTokenKey: PROVISIONING_SERVICE_TOKEN

secrets:
  create: true
  provisioningServiceToken: "scr-891001"
  digitalOceanToken: "dop_v1_e979f0beb13af8742c04081a2fb93e7dee3eee4ce7afe6550e78224f4987c5c6"
  runpodApiKey: "rpa_EPT39EAAG1BPYS9UG996FWSSA9D1K3XC3DB2XB081bvo1p"

billing:
  dns: billingservice
  image: midaswr/host-billingservice
  port: 8084

frontend:
  dns: frontend-service
  image: midaswr/host-frontend
  port: 80

hostagent:
  enabled: false
  dns: hostagent
  image: midaswr/host-hostagent

kafka:
  bootstrapService: host-kafka-kafka-bootstrap
  brokers: ""
