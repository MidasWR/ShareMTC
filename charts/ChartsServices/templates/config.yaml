apiVersion: v1
kind: ConfigMap
metadata:
  name: host-services-config
  namespace: {{ .Values.global.namespace }}
data:
  REDIS_ADDR: "redis.{{ .Values.global.namespace }}.svc.cluster.local:6379"
  {{- if .Values.kafka.brokers }}
  KAFKA_BROKERS: {{ .Values.kafka.brokers | quote }}
  {{- else }}
  KAFKA_BROKERS: "{{ .Values.kafka.bootstrapService }}.{{ .Values.global.namespace }}.svc.cluster.local:9092"
  {{- end }}
